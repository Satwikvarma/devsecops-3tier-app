services:
  mongodb:
    image: mongo

  backend:
    build: ./backend
    ports:
      - "5001:5001"
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend