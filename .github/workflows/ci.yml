name: CI Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build Docker images (docker-compose)
        run: docker compose build

      - name: Build backend Docker image
        run: |
          docker build -t three-tier-devsecops-learning-backend:latest backend

      - name: Build frontend Docker image
        run: |
          docker build -t three-tier-devsecops-learning-frontend:latest frontend

      - name: List Docker images (debug)
        run: docker images

      - name: Run Trivy scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: three-tier-devsecops-learning-backend:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Run Trivy scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: three-tier-devsecops-learning-frontend:latest
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH